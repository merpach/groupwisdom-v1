<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GroupWisdom</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; font-size: 14px; color: #111; background: #fff; min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .shell { max-width: 640px; margin: 0 auto; padding: 0 20px 80px; }

  header { display: flex; align-items: center; padding: 20px 0 16px; border-bottom: 1px solid #eee; margin-bottom: 28px; }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
  .group-name { color: #888; margin-left: 8px; font-size: 15px; }
  .spacer { flex: 1; }
  .icon-btn { background: none; border: none; cursor: pointer; color: #888; font-size: 18px; padding: 4px 6px; border-radius: 6px; }
  .icon-btn:hover { background: #f5f5f5; color: #111; }

  /* Add form */
  .add-bar { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
  .add-row { display: flex; gap: 8px; }
  input, textarea, select {
    font: inherit; font-size: 14px; padding: 9px 12px;
    border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; color: #111; width: 100%;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #aaa; background: #fff; }
  textarea { resize: none; min-height: 68px; }
  select { width: auto; flex-shrink: 0; }
  button { font: inherit; font-size: 13px; padding: 8px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #111; white-space: nowrap; }
  button:hover { background: #f5f5f5; }
  button.primary { background: #111; border-color: #111; color: #fff; font-weight: 500; letter-spacing: -.1px; }
  button.primary:hover { background: #1a1a1a; }

  /* Feed */
  .feed-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #bbb; margin-bottom: 12px; }
  .item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
  .item:last-child { border-bottom: none; }
  .item-icon { width: 32px; height: 32px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .item-body { flex: 1; min-width: 0; }
  .item-title { font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-title a { color: inherit; text-decoration: none; }
  .item-title a:hover { text-decoration: underline; }
  .item-meta { font-size: 12px; color: #bbb; }
  .item-content { font-size: 13px; color: #555; margin-top: 3px; line-height: 1.4; }
  .drop-zone {
    border: 2px dashed #e0e0e0; border-radius: 8px; padding: 24px;
    text-align: center; color: #bbb; font-size: 13px; margin-bottom: 24px;
    transition: border-color .15s, background .15s; cursor: pointer;
  }
  .drop-zone.over { border-color: #aaa; background: #fafafa; color: #888; }
  .drop-zone input[type=file] { display: none; }
  .uploading { opacity: .5; pointer-events: none; }
  .empty { color: #bbb; text-align: center; padding: 40px 0; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 12px; width: 580px; max-width: 94vw; max-height: 88vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-head { display: flex; align-items: center; padding: 18px 20px 0; flex-shrink: 0; }
  .modal-head h2 { font-size: 15px; font-weight: 600; flex: 1; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #aaa; padding: 0 2px; line-height: 1; }
  .modal-close:hover { color: #111; }
  .modal-tabs { display: flex; gap: 0; border-bottom: 1px solid #eee; padding: 0 20px; margin-top: 12px; flex-shrink: 0; }
  .modal-tab { font: inherit; font-size: 13px; padding: 8px 14px; border: none; background: none; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .modal-tab.active { color: #111; border-bottom-color: #111; }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
  .field-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .07em; margin: 18px 0 6px; }
  .field-label:first-child { margin-top: 0; }
  .kv { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .kv code { font-size: 12px; background: #f5f5f5; padding: 4px 8px; border-radius: 6px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  pre { background: #f7f7f7; border: 1px solid #eee; border-radius: 8px; padding: 14px; font-size: 12px; overflow-x: auto; line-height: 1.55; white-space: pre; }
  .member-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: #111; color: #fff; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .connector-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
  .pill { font-size: 11px; border-radius: 999px; padding: 3px 9px; background: #f0f0f0; color: #555; }
  .pill.on { background: #e8f5ee; color: #1d7a46; }
  .step { display: flex; gap: 12px; margin-bottom: 18px; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: #111; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-body { flex: 1; }
  .step-body strong { font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; }
  .step-body p { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 6px; }

  /* Projects home */
  .projects-header { display: flex; align-items: center; padding: 20px 0 24px; border-bottom: 1px solid #eee; margin-bottom: 32px; }
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .project-card { border: 1px solid #e8e8e8; border-radius: 10px; padding: 16px; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
  .project-card:hover { border-color: #bbb; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .project-card .p-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .project-card .p-meta { font-size: 12px; color: #bbb; }
  .new-project-card { border: 1px dashed #ddd; border-radius: 10px; padding: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 14px; gap: 6px; transition: border-color .15s, color .15s; }
  .new-project-card:hover { border-color: #aaa; color: #555; }
  .project-card .delete-btn { display: none; position: absolute; top: 8px; right: 8px; background: none; border: none; color: #bbb; font-size: 16px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .project-card { position: relative; }
  .project-card:hover .delete-btn { display: block; }
  .project-card .delete-btn:hover { color: #e5484d; background: #fff0f0; }

  /* Insight panel */
  .insight-panel { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 10px; padding: 20px; margin-bottom: 28px; }
  .insight-panel .panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .insight-panel .panel-header h2 { font-size: 15px; font-weight: 600; flex: 1; }
  .insight-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
  .insight-card:last-child { margin-bottom: 0; }
  .insight-card .i-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .insight-card .i-kind { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #888; }
  .insight-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .insight-card p { font-size: 13px; color: #555; line-height: 1.5; }
  .insight-card .i-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-add { background: #111; color: #fff; border-color: #111; font-size: 12px; padding: 5px 12px; }
  .btn-add:hover { background: #333; }
  .btn-dismiss { font-size: 12px; padding: 5px 12px; color: #888; }
  .spinning { animation: spin .8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; font-size: 13px; border-radius: 8px; padding: 8px 16px; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="shell" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const api = {
  get: p => fetch("/api" + p, { credentials: "include" }).then(r => r.json()),
  post: (p, b) => fetch("/api" + p, { method: "POST", headers: { "Content-Type": "application/json" }, credentials: "include", body: JSON.stringify(b) }).then(r => r.json()),
  delete: p => fetch("/api" + p, { method: "DELETE", credentials: "include" }).then(r => r.json()),
};
const ICON = { link: "🔗", note: "📝", thought: "💭", file: "📄" };
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const ago = ts => {
  if (!ts) return "";
  const m = Math.max(0, (Date.now() - new Date(ts.replace(" ", "T") + "Z").getTime()) / 60000);
  if (m < 1) return "just now";
  if (m < 60) return Math.round(m) + "m ago";
  if (m < 1440) return Math.round(m / 60) + "h ago";
  return Math.round(m / 1440) + "d ago";
};

const state = { groups: [], group: null, items: [], insights: [], view: "projects", proposals: null, analyzing: false, user: null };

const KIND_COLOR = { connection: '#5b5bd6', blind_spot: '#e8a13c', conflict: '#e5484d', pattern: '#8e4ec6', question: '#0091ff', decision: '#30a46c' };

function toast(msg) {
  const el = $("#toast"); el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2600);
}

function checkAccessWall() {
  if (localStorage.getItem("gw_access") === "1") return true;
  const wall = document.createElement("div");
  wall.id = "gw-wall";
  wall.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#FAFAF8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <div style="font-size:15px;font-weight:700;letter-spacing:-.2px;margin-bottom:32px">GroupWisdom</div>
    <input id="gw-pw" type="password" placeholder="Access code" style="width:240px;padding:10px 14px;border:1px solid #DDD;border-radius:8px;font-size:14px;font-family:inherit;outline:none;text-align:center;background:#F0EFEA" onkeydown="if(event.key==='Enter')gwSubmit()">
    <div id="gw-err" style="color:#e5484d;font-size:13px;margin-top:10px;min-height:18px"></div>
  </div>`;
  document.body.prepend(wall);
  setTimeout(() => document.getElementById("gw-pw")?.focus(), 50);
  return false;
}

function gwSubmit() {
  const val = document.getElementById("gw-pw")?.value;
  if (val === "2026wisdom") {
    localStorage.setItem("gw_access", "1");
    document.getElementById("gw-wall")?.remove();
    boot();
  } else {
    const err = document.getElementById("gw-err");
    if (err) { err.textContent = "Incorrect access code."; setTimeout(() => err.textContent = "", 2000); }
  }
}

async function boot() {
  if (!checkAccessWall()) return;
  const me = await api.get("/me").catch(() => null);
  if (!me || me.error) return renderLanding();
  state.user = me;
  const groups = await api.get("/groups");
  state.groups = Array.isArray(groups) ? groups : [];
  renderDeveloper();
}

function renderLanding() {
  const app = $("#app");
  Object.assign(app.style, { maxWidth: "none", padding: "0", margin: "0" });

  app.innerHTML = `
    <style>
      @keyframes ld-wup  { to { transform: translateY(0); } }
      @keyframes ld-rule { to { width: 56px; } }
      @keyframes ld-fade { to { opacity: 1; } }
      @keyframes ld-dot  { 0%,100%{opacity:1} 50%{opacity:.3} }
      .ld-w   { display:block; transform:translateY(106%); animation:ld-wup .65s cubic-bezier(.2,0,0,1) forwards; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:64px; font-weight:900; color:#111; letter-spacing:-2.5px; line-height:1.0; }
      .ld-w1  { animation-delay:.05s; }
      .ld-w2  { animation-delay:.22s; }
      .ld-w3  { animation-delay:.39s; }
      .ld-bar { width:0; height:2px; background:#1B4FFF; margin:22px 0 22px; animation:ld-rule .55s .72s cubic-bezier(.2,0,0,1) forwards; }
      .ld-sub { opacity:0; animation:ld-fade .4s .86s forwards; }
      .ld-cta { opacity:0; animation:ld-fade .4s .96s forwards; }
      .ld-npm { opacity:0; animation:ld-fade .4s 1.04s forwards; }
      .ld-ic  { opacity:0; transform:translateY(8px); transition:opacity .35s,transform .35s; background:#fff; border:1px solid #E8E6E0; border-radius:8px; padding:12px 14px; }
      .ld-ic.vis { opacity:1; transform:translateY(0); }
      .ld-ldot { animation:ld-dot 2s ease-in-out infinite; }
    </style>
    <div style="min-height:100vh;display:flex;flex-direction:column;background:#FAFAF8">

      <!-- Nav -->
      <nav style="display:flex;align-items:center;padding:0 48px;height:60px;border-bottom:1px solid #EEECE8;max-width:1200px;width:100%;margin:0 auto;box-sizing:border-box">
        <div style="font-size:15px;font-weight:700;letter-spacing:-.2px;flex:1">GroupWisdom</div>
        <div style="display:flex;align-items:center;gap:4px">
          <a href="/docs" target="_blank" style="font-size:13px;color:#777;text-decoration:none;padding:6px 14px;border-radius:6px">Docs</a>
          <a href="/docs#demo" target="_blank" style="font-size:13px;color:#777;text-decoration:none;padding:6px 14px;border-radius:6px">Demo</a>
          <button onclick="resetShellAndRun(renderAuth)" style="font-size:13px;padding:7px 16px;border:1px solid #DDD;border-radius:7px;background:#FAFAF8;cursor:pointer;color:#555;margin-left:12px">Sign in</button>
        </div>
      </nav>

      <!-- Hero -->
      <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:0 48px">
        <div style="display:flex;align-items:center;gap:72px;width:100%;max-width:1200px;padding:56px 0">

          <!-- Left: headline + CTAs -->
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#bbb;margin-bottom:20px">For developers</div>
            <div>
              <div style="overflow:hidden"><span class="ld-w ld-w1">Group</span></div>
              <div style="overflow:hidden"><span class="ld-w ld-w2">intelligence</span></div>
              <div style="overflow:hidden"><span class="ld-w ld-w3">infrastructure</span></div>
            </div>
            <div class="ld-bar"></div>
            <p class="ld-sub" style="font-size:18px;color:#777;line-height:1.6;margin-bottom:32px">The view from across your entire team.</p>
            <div class="ld-cta" style="display:flex;align-items:center;gap:12px;margin-bottom:36px">
              <button onclick="resetShellAndRun(()=>renderAuth('signup'))" class="primary" style="font-size:15px;padding:12px 26px;border-radius:8px">Get API key</button>
              <a href="/docs" target="_blank" style="font-size:15px;color:#555;text-decoration:none;padding:12px 22px;border:1px solid #DDD;border-radius:9px;background:#FAFAF8">View docs ↗</a>
            </div>
            <div class="ld-npm" style="display:inline-flex;align-items:center;gap:10px;background:#F0EFEA;border-radius:8px;padding:10px 18px">
              <span style="width:7px;height:7px;border-radius:50%;background:#e5484d;flex-shrink:0"></span>
              <code style="font-size:13px;color:#555;font-family:ui-monospace,'SF Mono',monospace">npm install @groupwisdom/sdk</code>
            </div>
          </div>

          <!-- Right: live API demo -->
          <div style="width:400px;flex-shrink:0;background:#F0EFEA;border-radius:14px;padding:24px 22px">
            <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:14px;display:flex;align-items:center;gap:6px">
              <span class="ld-ldot" style="width:5px;height:5px;border-radius:50%;background:#00A870;flex-shrink:0"></span>
              Live API output
            </div>
            <div id="ld-list" style="display:flex;flex-direction:column;gap:8px"></div>
          </div>

        </div>
      </div>

    </div>`;

  const insights = [
    { kind: "pattern",    title: "Security blockers across three deals",        body: "Marco, Devon, and Yuki all report GDPR or SSO as blockers. Security is a deal prerequisite no one has escalated." },
    { kind: "blind_spot", title: "No one has looked at pricing objections",     body: "Four lost deals mention competitor pricing. The team is solving the wrong problem." },
    { kind: "connection", title: "Notion comes up in every enterprise call",    body: "Yuki, Marco, and Sara each logged it independently. This is a comparison buyers are making before you get the call." },
    { kind: "pattern",    title: "Technical buyers block legal sign-off",       body: "Devon and Marco both note the same sequence: technical approval stalls, then legal goes silent." },
    { kind: "question",   title: "What does the team know about Notion?",       body: "Three contributors flagged it as a competitor but no one has shared research on it." },
    { kind: "decision",   title: "SSO moves to Q1 roadmap",                    body: "Yuki and Devon’s notes together make the case. Three enterprise deals are gated on it." },
  ];
  let ldIdx = 0;
  const MAX_CARDS = 3;
  function addLdInsight() {
    const list = document.getElementById("ld-list");
    if (!list) return;
    if (list.children.length >= MAX_CARDS) {
      const oldest = list.firstElementChild;
      oldest.style.transition = "opacity .25s";
      oldest.style.opacity = "0";
      setTimeout(() => {
        if (oldest.parentNode) oldest.remove();
        insertLdCard();
      }, 280);
    } else {
      insertLdCard();
    }
  }
  function insertLdCard() {
    const list = document.getElementById("ld-list");
    if (!list) return;
    const { kind, title, body } = insights[ldIdx % insights.length];
    ldIdx++;
    const d = document.createElement("div");
    d.className = "ld-ic";
    d.innerHTML = "<div style=’font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#bbb;margin-bottom:5px’>" + kind + "</div><div style=’font-size:12.5px;font-weight:600;color:#111;margin-bottom:3px;line-height:1.35’>" + title + "</div><div style=’font-size:12px;color:#555;line-height:1.5’>" + body + "</div>";
    list.appendChild(d);
    void d.offsetHeight;
    d.classList.add("vis");
    setTimeout(addLdInsight, 2800);
  }
  setTimeout(addLdInsight, 900);
}

function resetShellAndRun(fn) {
  const app = $("#app");
  app.style.maxWidth = "";
  app.style.padding = "";
  app.style.margin = "";
  fn();
}

function renderAuth(tab = "login") {
  $("#app").innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:80vh">
      <div style="max-width:360px;width:100%;padding:40px 32px;border:1px solid #ddd;border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,.06)">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#bbb;margin-bottom:10px">Developer API</div>
        <div style="font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px">GroupWisdom</div>
        <div style="color:#888;font-size:13px;margin-bottom:28px;line-height:1.5">Group intelligence as infrastructure.<br>Ingest data, get insights, ship products.</div>
        <div style="display:flex;gap:0;border-bottom:1px solid #eee;margin-bottom:20px">
          <button onclick="renderAuth('login')" style="flex:1;padding:8px;border:none;background:none;cursor:pointer;font:inherit;font-size:13px;${tab==='login'?'border-bottom:2px solid #111;font-weight:600':'color:#888'}">Sign in</button>
          <button onclick="renderAuth('signup')" style="flex:1;padding:8px;border:none;background:none;cursor:pointer;font:inherit;font-size:13px;${tab==='signup'?'border-bottom:2px solid #111;font-weight:600':'color:#888'}">Create account</button>
        </div>
        ${tab === 'login' ? `
          <input id="authEmail" type="email" placeholder="Email" style="width:100%;margin-bottom:8px">
          <input id="authPassword" type="password" placeholder="Password" style="width:100%;margin-bottom:14px">
          <button class="primary" style="width:100%;padding:10px" onclick="doLogin()">Sign in</button>
        ` : `
          <input id="authName" placeholder="Your name" style="width:100%;margin-bottom:8px">
          <input id="authEmail" type="email" placeholder="Email" style="width:100%;margin-bottom:8px">
          <input id="authPassword" type="password" placeholder="Password" style="width:100%;margin-bottom:14px">
          <button class="primary" style="width:100%;padding:10px" onclick="doSignup()">Create account</button>
        `}
        <div id="authErr" style="color:#e5484d;font-size:13px;margin-top:10px;min-height:18px"></div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById("authEmail")?.focus(), 50);
}

async function doLogin() {
  const email = document.getElementById("authEmail")?.value.trim();
  const password = document.getElementById("authPassword")?.value;
  if (!email || !password) return document.getElementById("authErr").textContent = "Email and password required.";
  const res = await fetch("/api/auth/login", { method: "POST", headers: { "Content-Type": "application/json" }, credentials: "include", body: JSON.stringify({ email, password }) });
  const data = await res.json();
  if (!res.ok) return document.getElementById("authErr").textContent = data.error;
  state.user = data;
  state.groups = await api.get("/groups");
  renderDeveloper();
}

async function doSignup() {
  const name = document.getElementById("authName")?.value.trim();
  const email = document.getElementById("authEmail")?.value.trim();
  const password = document.getElementById("authPassword")?.value;
  if (!name || !email || !password) return document.getElementById("authErr").textContent = "All fields required.";
  const res = await fetch("/api/auth/signup", { method: "POST", headers: { "Content-Type": "application/json" }, credentials: "include", body: JSON.stringify({ name, email, password }) });

  state.user = data;
  state.groups = [];
  renderDeveloper();
}

function wizDots(steps, pos) {
  return steps.map((_, i) => {
    const done = i < pos, active = i === pos;
    const bg = done ? '#111' : active ? '#111' : '#e0e0e0';
    const color = (done || active) ? '#fff' : '#999';
    const label = done ? '✓' : i + 1;
    return `<div style="width:28px;height:28px;border-radius:50%;background:${bg};color:${color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0">${label}</div>` +
      (i < steps.length - 1 ? `<div style="flex:1;height:2px;background:${i < pos ? '#111' : '#e0e0e0'};margin:0 6px"></div>` : '');
  }).join('');
}

function renderWizStep(tab) {
  const steps = window._wiz[tab];
  const pos = window._wizPos[tab];
  const step = steps[pos];
  const isLast = pos === steps.length - 1;

  if (step.copyIdx !== null && step.copyIdx !== undefined) {
    navigator.clipboard.writeText(_prompts[step.copyIdx]).catch(() => {});
  }

  const el = document.getElementById('wiz-' + tab);
  if (!el) return;
  el.innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:28px">${wizDots(steps, pos)}</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:10px">${esc(step.title)}</div>
    <div style="font-size:14px;color:#333;line-height:1.7;margin-bottom:16px">${step.body}</div>
    ${step.copyNote ? `<div style="display:flex;align-items:center;gap:6px;background:#f0faf0;border:1px solid #b7ddb7;border-radius:6px;padding:8px 12px;font-size:13px;color:#1a7a1a;margin-bottom:16px">✓ ${esc(step.copyNote)} — just paste</div>` : ''}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      ${step.openUrl ? `<button onclick="window.open('${step.openUrl}','_blank')" style="font:inherit;font-size:13px;padding:9px 16px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;cursor:pointer">${esc(step.openLabel)}</button>` : ''}
      ${isLast
        ? `<div style="font-size:13px;color:#888;padding:9px 4px">You're all set ✓</div>`
        : `<button class="primary" style="font-size:13px;padding:9px 20px" onclick="advanceWizard('${tab}')">Done — next step →</button>`}
    </div>`;
}

window.advanceWizard = function(tab) {
  const steps = window._wiz[tab];
  if (window._wizPos[tab] < steps.length - 1) {
    window._wizPos[tab]++;
    renderWizStep(tab);
  }
};

window.showSetupTab = function(tab) {
  ['web','desktop'].forEach(t => {
    document.getElementById('wiz-' + t).style.display = t === tab ? '' : 'none';
    document.getElementById('tab-' + t).style.background = t === tab ? '#111' : '#f5f5f5';
    document.getElementById('tab-' + t).style.color = t === tab ? '#fff' : '#555';
  });
  renderWizStep(tab);
};

// Init wizard after HTML is in DOM
window._initWizard = function() {
  if (window._wiz) { renderWizStep('web'); }
};

window.addItem = async () => {
  const title = $("#itTitle").value.trim();
  const content = $("#itContent").value.trim();
  const url = $("#itUrl").value.trim();
  if (!title && !content && !url) return;
  const type = $("#itType").value;

  // optimistic: show immediately
  const optimistic = { id: "_tmp", type, title: title || url || content.slice(0, 60), content, url, source: "web", created_at: new Date().toISOString().replace("T", " ").slice(0, 19) };
  state.items = [optimistic, ...state.items];
  render();
  $("#itTitle").value = ""; $("#itContent").value = ""; $("#itUrl").value = "";

  const saved = await api.post(`/groups/${state.group.id}/items`, {
    title: optimistic.title, content, url, type, member_id: $("#itMember")?.value || null,
  });
  // replace optimistic with real item
  state.items = state.items.map(i => i.id === "_tmp" ? saved : i);
  render();
  toast("Added — your AI connector will see this");
};

  const existing = document.querySelector('.overlay');
  if (existing) existing.remove();

  overlay.className = "overlay";
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <h2>Settings</h2>
        <button class="modal-close" onclick="this.closest('.overlay').remove()">×</button>

window.generateInvite = async () => {
  const email = document.getElementById("inviteEmail")?.value.trim() ?? "";

  const link = data.url;
  document.getElementById("inviteLink").value = link;

window.copyInvite = () => {

window.runAnalysis = async () => {
  if (!state.group || state.analyzing) return;
  state.analyzing = true;
  state.proposals = null;
  render();
  try {
    const proposals = await api.get(`/groups/${state.group.id}/analyze/preview`);
    state.proposals = proposals;
  } catch {
    toast("Analysis failed — check your API key in settings");
  }
  state.analyzing = false;
  render();
};

window.acceptProposal = async (i) => {
  const p = state.proposals[i];
  if (!p) return;
  const saved = await api.post(`/groups/${state.group.id}/insights`, { kind: p.kind, title: p.title, body: p.body });
  state.proposals = state.proposals.filter((_, j) => j !== i);
  state.insights = [saved, ...state.insights];
  toast("Insight added to project");
  render();
};

window.dismissProposal = (i) => {
  state.proposals = state.proposals.filter((_, j) => j !== i);
  render();
};

// Live push
let _ws = null;
function connectLive(groupId) {
  if (_ws) _ws.close();
  const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${wsProto}//${location.host}`);
  _ws = ws;
  ws.onopen = () => ws.send(JSON.stringify({ subscribe: groupId }));
  ws.onmessage = async ({ data }) => {
    try {
      const { event, groupId: gid } = JSON.parse(data);
      if (event === "update" && gid === state.group?.id) {
        const [items, insights, group] = await Promise.all([
          api.get("/groups/" + gid + "/items"),
          api.get("/groups/" + gid + "/insights"),
          api.get("/groups/" + gid),
        ]);
        state.items = items;
        state.insights = insights;
        state.group = { ...state.group, ...group };
        render();
      }
    } catch {}
  };
  ws.onclose = () => { if (state.group?.id === groupId) setTimeout(() => connectLive(groupId), 2000); };
}

window.onDragOver = e => {
  e.preventDefault();
  $("#dropZone")?.classList.add("over");
};
window.onDragLeave = () => $("#dropZone")?.classList.remove("over");
window.onDrop = e => {
  e.preventDefault();
  $("#dropZone")?.classList.remove("over");
  uploadFiles(e.dataTransfer.files);
};
window.uploadFiles = async files => {
  if (!files?.length) return;
  const zone = $("#dropZone");
  zone.classList.add("uploading");
  zone.textContent = `Uploading ${files.length} file${files.length === 1 ? "" : "s"}…`;
  const form = new FormData();
  for (const f of files) form.append("files", f);
  const memberId = $("#itMember")?.value;
  if (memberId) form.append("member_id", memberId);
  try {
    const r = await fetch(`/api/groups/${state.group.id}/upload`, { method: "POST", body: form });
    const data = await r.json();
    toast(`${data.created} file${data.created === 1 ? "" : "s"} added — engine checking for connections`);
    await loadGroup(state.group.id);
  } catch {
    toast("Upload failed");
    zone.classList.remove("uploading");
    zone.textContent = "Drop files here — PDFs, docs, text files";
  }
};

async function _loadDevDetail(projectId, tab = 'insights') {
  _devProjectTab = tab;
  const project = _devProjects.find(p => p.id === projectId);
  if (!project) return;

  let insights = [];
  let items = [];
  if (tab === 'insights') {
    insights = await fetch('/v1/projects/' + projectId + '/insights', {
      headers: { 'Authorization': 'Bearer ' + state.user.api_key }
    }).then(r => r.json()).catch(() => []);
  }
  if (tab === 'add') {
    items = await fetch('/v1/projects/' + projectId + '/items', {
      headers: { 'Authorization': 'Bearer ' + state.user.api_key }
    }).then(r => r.json()).catch(() => []);
  }

  const tabs = ['insights','add','quickstart','settings'].map(t => `
    <button onclick="devSwitchTab('${t}')" style="font:inherit;font-size:13px;padding:8px 16px;border:none;background:none;cursor:pointer;color:${_devProjectTab===t?'#111':'#aaa'};border-bottom:2px solid ${_devProjectTab===t?'#111':'transparent'};margin-bottom:-1px">${{insights:'Insights',add:'Add Data',quickstart:'Quickstart',settings:'Settings'}[t]}</button>`).join('');

  let body = '';

  if (tab === 'insights') {
    const kindBadge = i => `<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:4px;background:${KIND_BG_DEV[i.kind]||'#f0f0f0'};color:${KIND_COLOR_DEV[i.kind]||'#555'}">${i.kind.replace('_',' ')}</span>`;
    body = insights.length
      ? insights.map(i => `
          <div style="padding:14px 0;border-bottom:1px solid #f0f0f0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">${kindBadge(i)}<span style="font-size:12px;color:#bbb">${ago(i.created_at)}</span></div>

            <div style="font-size:13px;color:#555;line-height:1.5">${esc(i.body)}</div>
          </div>`).join('')
      : `<div style="color:#bbb;font-size:14px;padding:32px 0;text-align:center">No insights yet — add data or connect Claude to start generating insights.</div>`;
  }

  if (tab === 'add') {
    const recentItems = items.slice(0, 8).map(i => `
      <div style="padding:8px 0;border-bottom:1px solid #f5f5f5;display:flex;gap:10px;align-items:flex-start">
        <span style="font-size:11px;font-weight:600;color:#aaa;padding-top:2px;flex-shrink:0;text-transform:uppercase">${i.type}</span>
        <div>
          <div style="font-size:13px;font-weight:500">${esc(i.title)}</div>
          ${i.content ? `<div style="font-size:12px;color:#888;margin-top:2px">${esc(i.content.slice(0,100))}${i.content.length>100?'…':''}</div>` : ''}
        </div>
        <div style="font-size:11px;color:#ccc;margin-left:auto;flex-shrink:0;padding-top:2px">${ago(i.created_at)}</div>
      </div>`).join('') || `<div style="color:#bbb;font-size:13px;padding:12px 0">Nothing added yet.</div>`;

    body = `
      <div style="background:#fafafa;border:1px solid #e8e8e8;border-radius:10px;padding:20px;margin-bottom:28px">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px">Add item to project</div>
        <input id="dev-title" placeholder="Title or headline" style="font:inherit;font-size:13px;padding:9px 12px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;width:100%;margin-bottom:8px">
        <textarea id="dev-content" placeholder="Content, notes, or context (optional)" rows="3" style="font:inherit;font-size:13px;padding:9px 12px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;width:100%;resize:none;margin-bottom:8px"></textarea>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input id="dev-url" placeholder="URL (optional)" style="font:inherit;font-size:13px;padding:9px 12px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;flex:1">
          <input id="dev-from" placeholder="From (optional)" style="font:inherit;font-size:13px;padding:9px 12px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;width:140px">
          <select id="dev-type" style="font:inherit;font-size:13px;padding:9px 12px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;width:110px">
            <option value="note">Note</option>
            <option value="link">Link</option>
            <option value="thought">Thought</option>
            <option value="file">File</option>
          </select>
        </div>
        <button onclick="devAddItem('${projectId}')" class="primary" style="font-size:13px;padding:9px 20px">Add to project</button>
      </div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#bbb;margin-bottom:10px">Recent items (${items.length})</div>
      ${recentItems}`;
  }

  if (tab === 'quickstart') {
    const apiKey = state.user.api_key;
    const pid = project.id;
    const origin = window.location.origin;
    window._qsSnippets = {
      node: `import GroupWisdom from '@groupwisdom/sdk';\n\nconst gw = new GroupWisdom({ apiKey: '${apiKey}' });\n\n// Send data to your project\nawait gw.ingest('${pid}', [\n  { title: 'Q3 strategy doc', type: 'note', content: 'Focus on enterprise.', contributed_by: 'Alice' },\n  { title: 'Competitor analysis', url: 'https://example.com/report', contributed_by: 'Bob' },\n]);\n\n// Fetch insights\nconst { data } = await gw.listInsights('${pid}');\nconsole.log(data);`,
      curl: `# Ingest items\ncurl -X POST ${origin}/v1/projects/${pid}/ingest \\\n  -H "Authorization: Bearer ${apiKey}" \\\n  -H "Content-Type: application/json" \\\n  -d '{"title":"My first item","content":"Notes here","contributed_by":"Alice"}'\n\n# Get insights\ncurl ${origin}/v1/projects/${pid}/insights \\\n  -H "Authorization: Bearer ${apiKey}"`,
    };
    body = `
      <div style="margin-bottom:20px">
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button onclick="devQsTab('node')" id="qs-btn-node" style="font:inherit;font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;cursor:pointer;border:1px solid #111;background:#111;color:#fff">Node.js SDK</button>
          <button onclick="devQsTab('curl')" id="qs-btn-curl" style="font:inherit;font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;cursor:pointer;border:1px solid #e0e0e0;background:#fff;color:#555">cURL</button>
        </div>
        <div id="qs-node" style="position:relative">
          <pre style="background:#f7f7f7;border:1px solid #eee;border-radius:10px;padding:18px 48px 18px 18px;font-size:12px;line-height:1.6;overflow-x:auto;margin:0">${esc(window._qsSnippets.node)}</pre>
          <button onclick="navigator.clipboard.writeText(window._qsSnippets.node).then(()=>toast('Copied'))" style="position:absolute;top:10px;right:10px;font:inherit;font-size:11px;padding:4px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;color:#555">Copy</button>
        </div>
        <div id="qs-curl" style="position:relative;display:none">
          <pre style="background:#f7f7f7;border:1px solid #eee;border-radius:10px;padding:18px 48px 18px 18px;font-size:12px;line-height:1.6;overflow-x:auto;margin:0">${esc(window._qsSnippets.curl)}</pre>
          <button onclick="navigator.clipboard.writeText(window._qsSnippets.curl).then(()=>toast('Copied'))" style="position:absolute;top:10px;right:10px;font:inherit;font-size:11px;padding:4px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;color:#555">Copy</button>
        </div>
      </div>
      <div style="background:#f7f7f7;border-radius:10px;padding:16px;font-size:13px;color:#555;line-height:1.6">
        <strong style="color:#111">Your key and project ID are already filled in.</strong><br>
        Install the SDK with <code style="background:#eee;padding:1px 5px;border-radius:4px">npm install @groupwisdom/sdk</code>, then paste and run.
        Insights appear in this portal within seconds of ingesting data.
      </div>`;
  }

  if (tab === 'settings') {
    const mcpUrl = window.location.origin + '/mcp?key=' + encodeURIComponent(state.user.api_key);
    const hasWebhook = !!project.webhook_url;
    body = `
      <div style="margin-bottom:28px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#bbb;margin-bottom:8px">Project ID</div>
        <div style="display:flex;align-items:center;gap:8px">
          <code style="font-size:13px;background:#f5f5f5;padding:8px 12px;border-radius:6px;flex:1">${esc(project.id)}</code>
          <button onclick="navigator.clipboard.writeText('${esc(project.id)}').then(()=>toast('Copied'))" style="font-size:13px;padding:8px 14px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;cursor:pointer">Copy</button>
        </div>
      </div>
      <div style="margin-bottom:28px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#bbb;margin-bottom:8px">AI Engine</div>
        <p style="font-size:13px;color:#888;margin-bottom:10px">Choose which AI model runs analysis on this project. Claude is the default.</p>
        <div style="display:flex;gap:8px">
          <button onclick="devSetEngine('${project.id}','claude')" style="font:inherit;font-size:13px;padding:9px 18px;border-radius:8px;cursor:pointer;border:1px solid ${(project.engine||'claude')==='claude'?'#111':'#e0e0e0'};background:${(project.engine||'claude')==='claude'?'#111':'#fff'};color:${(project.engine||'claude')==='claude'?'#fff':'#555'}">Claude (default)</button>
          <button onclick="devSetEngine('${project.id}','muse-spark')" style="font:inherit;font-size:13px;padding:9px 18px;border-radius:8px;cursor:pointer;border:1px solid ${project.engine==='muse-spark'?'#111':'#e0e0e0'};background:${project.engine==='muse-spark'?'#111':'#fff'};color:${project.engine==='muse-spark'?'#fff':'#555'}">Muse Spark</button>
        </div>
        <div id="dev-engine-msg" style="font-size:12px;color:#1d7a46;margin-top:8px;display:none"></div>
      </div>
      <div style="margin-bottom:28px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#bbb;margin-bottom:8px">Webhook URL</div>
        <p style="font-size:13px;color:#888;margin-bottom:8px">GroupWisdom will POST new insights here automatically after each analysis.</p>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input id="dev-wh" value="${esc(project.webhook_url || '')}" placeholder="https://your-server.com/hook" style="font:inherit;font-size:13px;padding:9px 12px;border:1px solid #e0e0e0;border-radius:8px;background:#fafafa;flex:1">
          <button onclick="devSaveWebhook('${project.id}')" style="font-size:13px;padding:9px 16px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;white-space:nowrap">Save</button>
          <button onclick="devTestWebhook('${project.id}')" ${hasWebhook?'':'disabled'} style="font-size:13px;padding:9px 16px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:${hasWebhook?'pointer':'default'};color:${hasWebhook?'#111':'#ccc'};white-space:nowrap">Send test</button>
        </div>
        <div id="dev-wh-msg" style="font-size:12px;color:#1d7a46;margin-top:4px;display:none"></div>
        <p style="font-size:12px;color:#bbb;margin-top:6px">Use <a href="https://webhook.site" target="_blank" style="color:#888">webhook.site</a> to test without a real server.</p>
      </div>
      <div style="margin-bottom:28px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#bbb;margin-bottom:8px">Claude Connector (MCP)</div>
        <p style="font-size:13px;color:#888;margin-bottom:8px">Add this URL as a custom connector in Claude to let your team use Claude with this project automatically.</p>
        <div style="display:flex;gap:8px">
          <code style="font-size:12px;background:#f5f5f5;padding:9px 12px;border-radius:8px;flex:1;word-break:break-all">${esc(mcpUrl)}</code>
          <button onclick="navigator.clipboard.writeText('${esc(mcpUrl)}').then(()=>toast('MCP URL copied'))" style="font-size:13px;padding:9px 16px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;flex-shrink:0">Copy</button>
        </div>
      </div>
      <div style="margin-bottom:28px;padding-top:28px;border-top:1px solid #eee">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#bbb;margin-bottom:8px">Ingest endpoint</div>
        <code style="font-size:12px;background:#f5f5f5;padding:9px 12px;border-radius:8px;display:block;word-break:break-all">${esc(window.location.origin)}/v1/projects/${esc(project.id)}/ingest</code>
        <p style="font-size:12px;color:#bbb;margin-top:6px">POST items here from your backend. <a href="/docs" target="_blank" style="color:#888">See docs →</a></p>
      </div>
      <div style="padding-top:24px;border-top:1px solid #fee">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#e0a0a0;margin-bottom:8px">Danger zone</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:16px">
          <p style="font-size:13px;color:#888;margin:0">Permanently delete <strong>${esc(project.name)}</strong> and all its items and insights. This cannot be undone.</p>
          <button onclick="devDeleteProject('${esc(project.id)}','${esc(project.name)}')" style="font:inherit;font-size:13px;padding:8px 16px;border:1px solid #e0a0a0;border-radius:8px;background:#fff;cursor:pointer;color:#cc3333;white-space:nowrap;flex-shrink:0">Delete project</button>
        </div>
      </div>`;
  }

  document.getElementById('dev-detail').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:4px">
      <div style="font-size:22px;font-weight:700">${esc(project.name)}</div>
      <div style="font-size:13px;color:#bbb">${project.counts.items} items · ${project.counts.insights} insights</div>
    </div>
    <div style="border-bottom:1px solid #eee;margin-bottom:24px;display:flex;gap:0">${tabs}</div>
    ${body}`;
}

window.devSelectProject = async function(id) {
  _devSelected = id;
  _devPage = 'project';
  _devProjectTab = 'insights';
  _devProjectsOpen = false;
  _renderDevShell();
  await _loadDevDetail(id, 'insights');
};

window.devToggleProjectDropdown = function() {
  _devProjectsOpen = !_devProjectsOpen;
  _renderDevShell();
  if (_devPage === 'project' && _devSelected) _loadDevDetail(_devSelected, _devProjectTab);
};

window.devCloseDropdown = function(e) {
  if (_devProjectsOpen && !e.target.closest('[onclick*="devToggleProjectDropdown"]')) {
    _devProjectsOpen = false;
    _renderDevShell();
    if (_devPage === 'project' && _devSelected) _loadDevDetail(_devSelected, _devProjectTab);
  }
};

window.devShowUsage = function() {
  _devPage = 'usage';
  _devProjectsOpen = false;
  _renderDevShell();
};

window.devSwitchTab = async function(tab) {
  await _loadDevDetail(_devSelected, tab);
};

window.devNewProject = async function() {
  const name = prompt('Project name:');
  if (!name?.trim()) return;
  const p = await fetch('/v1/projects', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + state.user.api_key, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name.trim() }),
  }).then(r => r.json());
  _devProjects = [..._devProjects, p];
  _devSelected = p.id;
  _renderDevShell();
  await _loadDevDetail(p.id, 'insights');
  toast('Project created');
};

window.devAddItem = async function(projectId) {
  const title = document.getElementById('dev-title')?.value.trim();
  const content = document.getElementById('dev-content')?.value.trim();
  const url = document.getElementById('dev-url')?.value.trim();
  const from = document.getElementById('dev-from')?.value.trim();
  const type = document.getElementById('dev-type')?.value;
  if (!title && !content && !url) return toast('Add a title or content first');
  const body = { title: title || url || content.slice(0,60), content, url, type };
  if (from) body.contributed_by = from;
  await fetch('/v1/projects/' + projectId + '/ingest', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + state.user.api_key, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  toast('Added — wisdom engine is running');
  // refresh counts
  _devProjects = await fetch('/v1/projects', {
    headers: { 'Authorization': 'Bearer ' + state.user.api_key }
  }).then(r => r.json()).catch(() => _devProjects);
  await _loadDevDetail(projectId, 'add');
};

window.devSetEngine = async function(projectId, engine) {
  await fetch('/v1/projects/' + projectId, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + state.user.api_key, 'Content-Type': 'application/json' },
    body: JSON.stringify({ engine }),
  });
  const p = _devProjects.find(p => p.id === projectId);
  if (p) p.engine = engine;
  await _loadDevDetail(projectId, 'settings');
  const msg = document.getElementById('dev-engine-msg');
  if (msg) { msg.textContent = 'Engine updated to ' + (engine === 'muse-spark' ? 'Muse Spark' : 'Claude') + '.'; msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 2500); }
};

window.devSaveWebhook = async function(projectId) {
  const url = document.getElementById('dev-wh')?.value.trim() || null;
  await fetch('/v1/projects/' + projectId, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + state.user.api_key, 'Content-Type': 'application/json' },
    body: JSON.stringify({ webhook_url: url }),
  });
  const p = _devProjects.find(p => p.id === projectId);
  if (p) p.webhook_url = url;
  const msg = document.getElementById('dev-wh-msg');
  if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 2000); }
};

window.devTestWebhook = async function(projectId) {
  const msg = document.getElementById('dev-wh-msg');
  if (msg) { msg.style.display = 'block'; msg.style.color = '#888'; msg.textContent = 'Sending…'; }
  const r = await fetch('/v1/projects/' + projectId + '/test-webhook', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + state.user.api_key },
  }).then(r => r.json()).catch(() => ({ sent: false, error: 'Network error' }));
  if (msg) {
    msg.textContent = r.sent ? '✓ Test event delivered (HTTP ' + r.status + ')' : '✗ ' + (r.error || 'Delivery failed');
    msg.style.color = r.sent ? '#1d7a46' : '#cc3333';
    msg.style.display = 'block';
    setTimeout(() => { if (msg) msg.style.display = 'none'; }, 4000);
  }
};

window.devDeleteProject = async function(projectId, projectName) {
  if (prompt(`Type the project name to confirm deletion:\n\n"${projectName}"`) !== projectName) return;
  await fetch('/v1/projects/' + projectId, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + state.user.api_key },
  });
  _devProjects = _devProjects.filter(p => p.id !== projectId);
  _devSelected = _devProjects[0]?.id ?? null;
  _devPage = 'project';
  _renderDevShell();
  if (_devSelected) await _loadDevDetail(_devSelected, 'insights');
  toast('Project deleted');
};

window.devQsTab = function(tab) {
  document.getElementById('qs-node').style.display = tab === 'node' ? 'block' : 'none';
  document.getElementById('qs-curl').style.display = tab === 'curl' ? 'block' : 'none';
  document.getElementById('qs-btn-node').style.background = tab === 'node' ? '#111' : '#fff';
  document.getElementById('qs-btn-node').style.color = tab === 'node' ? '#fff' : '#555';
  document.getElementById('qs-btn-node').style.borderColor = tab === 'node' ? '#111' : '#e0e0e0';
  document.getElementById('qs-btn-curl').style.background = tab === 'curl' ? '#111' : '#fff';
  document.getElementById('qs-btn-curl').style.color = tab === 'curl' ? '#fff' : '#555';
  document.getElementById('qs-btn-curl').style.borderColor = tab === 'curl' ? '#111' : '#e0e0e0';
};

window.saveWebhook = window.devSaveWebhook; // keep old alias working
window.renderDeveloper = renderDeveloper;

boot();
</script>
</body>
</html>
